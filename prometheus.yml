global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: cloudbridge
    static_configs:
      - targets:
          - cloudbridge:8080   # docker-compose service name
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
