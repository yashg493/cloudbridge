apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudbridge-config
  namespace: cloudbridge
  labels:
    app: cloudbridge-gateway
data:
  WORKER_COUNT: "10"
  LOG_LEVEL: "info"
  NFS_BASE_PATH: "/tmp/cloudbridge-nfs"
  CLOUD_BACKEND: "mock"
  # DATABASE_URL and secrets are injected from a Secret object.
  # Adjust CLOUD_BACKEND to "s3" or "gcs" and add credentials via Secrets
  # when connecting to a real cloud storage backend.
