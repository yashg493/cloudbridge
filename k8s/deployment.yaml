apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbridge-gateway
  namespace: cloudbridge
  labels:
    app: cloudbridge-gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudbridge-gateway
  template:
    metadata:
      labels:
        app: cloudbridge-gateway
        version: v1
      annotations:
        # Prometheus auto-discovery
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cloudbridge-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532   # distroless nonroot UID
        fsGroup: 65532
      containers:
        - name: gateway
          image: cloudbridge/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cloudbridge-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudbridge-secrets
                  key: db-password
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudbridge-secrets
                  key: aws-secret-access-key
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 35   # > server shutdown timeout (30s)
