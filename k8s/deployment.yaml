apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbridge-gateway
  namespace: cloudbridge
  labels:
    app: cloudbridge-gateway
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloudbridge-gateway
  template:
    metadata:
      labels:
        app: cloudbridge-gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cloudbridge-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000     # appuser from Dockerfile adduser -D appuser
        fsGroup: 1000
      terminationGracePeriodSeconds: 40   # preStop 5s + server drain 30s + buffer
      containers:
        - name: gateway
          image: cloudbridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cloudbridge-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudbridge-secrets
                  key: database-url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Give the load balancer 5 s to drain connections before the
                # process receives SIGTERM and starts its 30 s graceful shutdown.
                command: ["/bin/sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # app writes to NFS_BASE_PATH
            capabilities:
              drop: ["ALL"]
