apiVersion: v1
kind: Service
metadata:
  name: cloudbridge-gateway
  namespace: cloudbridge
  labels:
    app: cloudbridge-gateway
spec:
  type: ClusterIP
  selector:
    app: cloudbridge-gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080          # cluster-internal port exposed on 8080 (not 80)
      targetPort: http    # maps to containerPort named "http" (8080)
