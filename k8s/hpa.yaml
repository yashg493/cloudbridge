apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudbridge-gateway
  namespace: cloudbridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudbridge-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # react quickly to traffic spikes
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60            # add up to 4 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 min cool-down before removing pods
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60            # remove at most 1 pod per minute
