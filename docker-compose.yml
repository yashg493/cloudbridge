version: "3.9"

services:

  # ── CloudBridge gateway ───────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cloudbridge?sslmode=disable
      WORKER_COUNT: "10"
      CLOUD_BACKEND: mock
      LOG_LEVEL: info
      NFS_BASE_PATH: /tmp/cloudbridge-nfs
      MIGRATIONS_PATH: /app/migrations/001_init.sql
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nfs-data:/tmp/cloudbridge-nfs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cloudbridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloudbridge"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Tiering Advisor ────────────────────────────────────────────────────────────
  tiering-advisor:
    build:
      context: ./tiering-advisor
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cloudbridge
      CLOUDBRIDGE_URL: http://gateway:8080
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

volumes:
  postgres_data:
